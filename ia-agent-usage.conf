# ia-agent-usage.conf — Configuration for multi-tool AI CLI usage monitor

# Enabled monitors (space-separated: claude gemini crush opencode)
ENABLED_MONITORS="claude"

# Poll interval in seconds (min 60, default 300)
POLL_INTERVAL=300

# Log level (debug, info, warn, error)
LOG_LEVEL="info"

# Notification sound (Linux notify-send style icons)
NOTIFY_ICON="dialog-information"

# Gemini timezone for daily reset (default: America/Los_Angeles for Pacific Time)
GEMINI_TZ="America/Los_Angeles"

# Optional: Custom paths (leave empty for defaults)
# STATE_DIR=""
# LOG_DIR=""
